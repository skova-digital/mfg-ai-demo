<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>入力 | 検査記録AI デモ</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<header class="site">
  <h1>検査記録AI デモ</h1>
  <span class="demo-badge">架空データによるデモ</span>
  <nav aria-label="メインナビゲーション">
    <a href="/" aria-current="page">入力</a>
    <a href="/records.html">記録一覧</a>
    <a href="/dashboard.html">ダッシュボード</a>
  </nav>
</header>
<main>
  <h2>現場の報告を、そのままデータに</h2>
  <p class="lead">口語のままの報告文や帳票の内容を貼り付けると、AI が検査記録に構造化します。内容を確認・修正してから保存する流れです。</p>

  <div class="notice" id="mode-notice">
    デモモードで動作中: サンプル入力を選ぶと、事前に実行した AI 変換の結果をご覧いただけます。自由入力のライブ変換は README のローカル実行手順で試せます。
  </div>

  <div class="card">
    <label for="inp">検査報告（テキスト）</label>
    <div class="sample-row" role="group" aria-label="サンプル入力">
      <button class="btn btn-ghost" data-sample="1">サンプル1: 口語の日報</button>
      <button class="btn btn-ghost" data-sample="2">サンプル2: 走り書き（複数件）</button>
      <button class="btn btn-ghost" data-sample="3">サンプル3: 帳票の転記</button>
    </div>
    <textarea id="inp" rows="6" placeholder="例: 7/6 MK-1024 ロットA、切削上がり50個検査。2個バリ、うち1個限度見本ギリ。田中"></textarea>
    <div id="err" class="error-box" role="alert" hidden></div>
    <p style="margin-top: 1rem;">
      <button class="btn" id="go">AIで構造化する</button>
    </p>
  </div>
</main>
<footer class="site">検査記録AI デモ — 架空の業務設定・生成データによるポートフォリオ作品です</footer>
<script>
const $ = (s) => document.querySelector(s);
let currentSample = null;

document.querySelectorAll("[data-sample]").forEach((btn) => {
  btn.addEventListener("click", async () => {
    currentSample = btn.dataset.sample;
    const res = await fetch(`/fixtures/sample-${currentSample}.json`);
    const f = await res.json();
    $("#inp").value = f.input_text;
    $("#err").hidden = true;
  });
});

$("#inp").addEventListener("input", () => { currentSample = null; });

$("#go").addEventListener("click", async () => {
  const text = $("#inp").value.trim();
  const err = $("#err");
  err.hidden = true;
  if (!text) { err.textContent = "報告テキストを入力するか、サンプルを選んでください。"; err.hidden = false; return; }
  $("#go").disabled = true;
  $("#go").textContent = "変換中…";
  try {
    const res = await fetch("/api/extract", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(currentSample ? { sample_id: currentSample, text } : { text }),
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || "変換に失敗しました。"; err.hidden = false; return; }
    sessionStorage.setItem("extract_result", JSON.stringify(data));
    location.href = "/review.html";
  } catch {
    err.textContent = "通信に失敗しました。時間をおいて再度お試しください。";
    err.hidden = false;
  } finally {
    $("#go").disabled = false;
    $("#go").textContent = "AIで構造化する";
  }
});
</script>
</body>
</html>
